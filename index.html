<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>LIGNUM — Jamaica's National AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   LIGNUM — Phase 1 Design System
   ═══════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── DESIGN TOKENS ── */
:root{
  /* Motion */
  --ease:.18s cubic-bezier(.4,0,.2,1);
  --ease-out:.22s cubic-bezier(0,0,.2,1);
  --panel-dur:300ms;
  --spring:.4s cubic-bezier(.34,1.3,.64,1);

  /* Brand accent */
  --gd:#c4902e;
  --gd-l:rgba(196,144,46,.07);
  --gd-b:rgba(196,144,46,.2);
  --gd-m:rgba(196,144,46,.5);

  /* Semantic colors */
  --gn:#22c55e;--rd:#e05252;--bl:#5898cc;
  --am:#e0aa30;/* amber — think mode */
  --teal:#3ab898;/* teal — build mode */
  --coral:#c44c3c;/* coral — act mode */

  /* Typography */
  --ff:'Geist',system-ui,-apple-system,sans-serif;
  --fm:'Geist Mono',ui-monospace,monospace;

  /* Layout */
  --sb-w:272px;
  --ctx-w:352px;

  /* Safe areas */
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);

  /* Spacing scale: 4 8 12 16 20 24 32 40 48 */
  --sp1:4px;--sp2:8px;--sp3:12px;--sp4:16px;--sp5:20px;
  --sp6:24px;--sp8:32px;--sp10:40px;--sp12:48px;

  /* Radius scale */
  --r1:6px;--r2:8px;--r3:10px;--r4:12px;--r5:14px;--r6:16px;--r7:18px;--r8:24px;
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  /* Backgrounds */
  --bg:#f7f6f2;
  --bg2:#f0eeea;

  /* Surfaces */
  --sf:#ffffff;
  --sf2:#f5f3ef;
  --sf3:#edebe6;

  /* Borders */
  --br:#e4e1db;
  --br2:#d1cdc5;

  /* Text */
  --tx:#100f0e;
  --tx2:#635e57;
  --tx3:#9e9890;

  /* Shadows */
  --sh:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.05);
  --sh-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh-pop:0 8px 32px rgba(0,0,0,.11),0 2px 8px rgba(0,0,0,.05);
  --sh-xl:0 20px 60px rgba(0,0,0,.14),0 4px 16px rgba(0,0,0,.06);

  /* Component */
  --user-bg:#18171580;
  --user-tx:#f7f6f2;
  --ai-bg:#f5f3ef;
  --ai-bd:#e4e1db;
  --inp-bg:#ffffff;
  --inp-bd:#dbd8d0;

  /* Cards */
  --card-bg:#ffffff;
  --card-hdr:#f5f3ef;

  /* Overlays */
  --lib-bg:rgba(10,10,8,.48);
  --sb-active-bg:rgba(196,144,46,.07);
}

/* ── DARK THEME ── */
[data-theme="dark"]{
  --bg:#0c0b0a;
  --bg2:#121110;
  --sf:#161513;
  --sf2:#1c1b18;
  --sf3:#232220;
  --br:#2a2925;
  --br2:#383532;
  --tx:#ede9e1;
  --tx2:#78736a;
  --tx3:#484440;
  --sh:0 1px 2px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.32);
  --sh-md:0 4px 16px rgba(0,0,0,.45);
  --sh-pop:0 8px 40px rgba(0,0,0,.6);
  --sh-xl:0 20px 64px rgba(0,0,0,.72);
  --user-bg:#c4902e;
  --user-tx:#fff;
  --ai-bg:#1c1b18;
  --ai-bd:#2a2925;
  --inp-bg:#1c1b18;
  --inp-bd:#2a2925;
  --card-bg:#1c1b18;
  --card-hdr:#232220;
  --lib-bg:rgba(0,0,0,.7);
  --sb-active-bg:rgba(196,144,46,.08);
}

/* ── BASE ── */
html,body{height:100%;height:-webkit-fill-available}
body{width:100%;background:var(--bg);color:var(--tx);font-family:var(--ff);font-size:15px;line-height:1.65;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background .3s,color .3s}
#app{display:flex;width:100%;height:100%;padding-left:var(--sal);padding-right:var(--sar);overflow:hidden}

/* focus ring */
:focus-visible{outline:2px solid var(--gd);outline-offset:2px;border-radius:var(--r1)}

/* ══════════════════════════════════════
   SIDEBAR — Phase 1
   ══════════════════════════════════════ */
.sb{width:var(--sb-w);min-width:var(--sb-w);background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:50;transition:transform var(--panel-dur) cubic-bezier(.4,0,.2,1)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:49;opacity:0;transition:opacity var(--panel-dur)}
.sb-overlay.show{opacity:1}

/* Sidebar head — more breathing room */
.sb-head{padding:var(--sp4) var(--sp3);padding-top:calc(var(--sp4) + var(--sat));border-bottom:1px solid var(--br);display:flex;align-items:center;gap:var(--sp2);flex-shrink:0;min-height:60px}
.logo-mark{display:flex;align-items:center;gap:var(--sp2);flex:1;cursor:pointer;padding:var(--sp1) var(--sp2);border-radius:var(--r2);transition:background var(--ease);min-width:0}
.logo-mark:hover{background:var(--sf2)}
.logo-name{font-size:12px;font-weight:700;letter-spacing:5px;color:var(--tx);line-height:1;text-transform:uppercase}
.logo-sub{font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-top:3px;font-weight:400}

.ic-btn{width:32px;height:32px;border:1px solid var(--br);border-radius:var(--r2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--ease);flex-shrink:0}
.ic-btn:hover{background:var(--sf2);color:var(--tx);border-color:var(--br2)}
.sb-close{width:32px;height:32px;border:none;background:transparent;color:var(--tx2);cursor:pointer;display:none;align-items:center;justify-content:center;border-radius:var(--r2);flex-shrink:0;transition:background var(--ease)}
.sb-close:hover{background:var(--sf2)}

/* New Chat — stronger, more intentional */
.sb-new{margin:var(--sp3) var(--sp3) var(--sp2);padding:var(--sp3) var(--sp4);background:var(--gd-l);border:1px solid var(--gd-b);border-radius:var(--r3);color:var(--gd);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:var(--sp2);font-family:var(--ff);min-height:42px;transition:all var(--ease);letter-spacing:.1px}
.sb-new:hover{background:rgba(196,144,46,.14);border-color:var(--gd-m)}

.sb-scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:var(--sp3)}
.sb-scr::-webkit-scrollbar{width:2px}
.sb-scr::-webkit-scrollbar-thumb{background:var(--br2);border-radius:1px}

/* Section labels */
.sb-lbl{padding:var(--sp4) var(--sp4) var(--sp1);font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--tx3)}

/* Nav rows — left accent active state */
.sb-row{display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp4);cursor:pointer;color:var(--tx2);font-size:13px;min-height:38px;transition:all var(--ease);user-select:none;border-left:2px solid transparent;position:relative}
.sb-row:hover{background:var(--sf2);color:var(--tx);border-left-color:var(--br2)}
.sb-row.act{color:var(--tx);font-weight:500;background:var(--sb-active-bg);border-left-color:var(--gd)}
.sb-row.act svg{color:var(--gd)}

/* Specialist folder */
.sb-spec-folder{display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp4);cursor:pointer;color:var(--tx2);font-size:13px;min-height:38px;transition:all var(--ease);border-left:2px solid transparent}
.sb-spec-folder:hover{background:var(--sf2);color:var(--tx);border-left-color:var(--br2)}
.sb-spec-folder-chev{margin-left:auto;transition:transform .22s;color:var(--tx3);flex-shrink:0}
.sb-spec-folder.open .sb-spec-folder-chev{transform:rotate(90deg)}
.sb-spec-inner{display:none;padding:0 0 var(--sp1) 0}
.sb-spec-inner.show{display:block}
.sb-pinned-item{display:flex;align-items:center;gap:var(--sp2);padding:6px var(--sp3) 6px 30px;cursor:pointer;font-size:12.5px;color:var(--tx2);min-height:34px;transition:all var(--ease)}
.sb-pinned-item:hover{background:var(--sf2);color:var(--tx)}
.sb-pinned-item.act{color:var(--gd);font-weight:500}
.sb-pinned-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-browse-btn{display:flex;align-items:center;gap:var(--sp2);padding:7px var(--sp3) 7px 30px;cursor:pointer;font-size:12px;color:var(--gd);font-weight:500;transition:color var(--ease)}
.sb-browse-btn:hover{color:var(--tx)}

/* Sidebar footer — cleaner, no demo text */
.sb-ft{padding:var(--sp3);padding-bottom:calc(var(--sp3) + var(--sab));border-top:1px solid var(--br);display:flex;align-items:center;gap:var(--sp2);flex-shrink:0}
.sb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gd-l),var(--sf3));border:1px solid var(--gd-b);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-ft-info{flex:1;min-width:0}
.sb-ft-name{font-size:12.5px;font-weight:600;line-height:1.2;color:var(--tx)}
.sb-ft-meta{font-size:10px;color:var(--tx3);margin-top:1px;letter-spacing:.2px}

/* ══════════════════════════════════════
   MAIN + TOP BAR
   ══════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg)}
.top-bar{display:none;padding:0 var(--sp4);padding-top:var(--sat);height:calc(56px + var(--sat));background:var(--sf);border-bottom:1px solid var(--br);align-items:flex-end;justify-content:space-between;flex-shrink:0;gap:var(--sp2);padding-bottom:var(--sp2)}
.tbar-logo{display:flex;align-items:center;gap:var(--sp2);font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--tx)}
.bar-btn{width:38px;height:38px;border:none;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);transition:background var(--ease)}
.bar-btn:active,.bar-btn:hover{background:var(--sf2)}
.view{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ══════════════════════════════════════
   HOME — Phase 1 Flagship
   ══════════════════════════════════════ */
.home{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-inner{display:flex;flex-direction:column;align-items:center;padding:0 var(--sp6);min-height:100%;justify-content:center;gap:0}

/* Hero identity */
.h-logo{display:flex;flex-direction:column;align-items:center;gap:var(--sp3);margin-bottom:var(--sp8)}
.h-greeting{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--tx3);font-weight:500}
.h-title{font-size:44px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--tx);line-height:1;margin-top:var(--sp1)}
.h-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--tx3);font-weight:400}
.h-tagline{font-size:13px;color:var(--tx3);font-weight:400;line-height:1.6;text-align:center;max-width:380px;margin-top:var(--sp1)}

/* Composer wrap */
.home-inbox-wrap{width:100%;max-width:640px;margin-bottom:var(--sp4)}

/* Mode hint row — subtle under composer */
.h-mode-row{display:flex;gap:var(--sp1);justify-content:center;max-width:640px;width:100%;margin-bottom:var(--sp8)}
.h-mode-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border:1px solid var(--br);border-radius:20px;font-size:11px;font-weight:500;font-family:var(--ff);color:var(--tx3);background:transparent;cursor:pointer;transition:all var(--ease);white-space:nowrap}
.h-mode-pill:hover{border-color:var(--br2);color:var(--tx2);background:var(--sf2)}
.h-mode-pill.act{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}

/* Suggestion chips */
.sug-chips{display:flex;gap:var(--sp2);flex-wrap:wrap;justify-content:center;max-width:560px;width:100%}
.sug-chip{padding:var(--sp2) var(--sp4);border:1px solid var(--br);border-radius:20px;font-size:13px;font-weight:400;font-family:var(--ff);color:var(--tx2);background:var(--sf);cursor:pointer;transition:all var(--ease);white-space:nowrap;line-height:1.4}
.sug-chip:hover{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}

/* ══════════════════════════════════════
   COMPOSER / INBOX — Phase 1
   ══════════════════════════════════════ */
.inbox{width:100%;background:var(--inp-bg);border:1px solid var(--inp-bd);border-radius:var(--r6);box-shadow:var(--sh-md);overflow:hidden;transition:border-color var(--ease),box-shadow var(--ease)}
.inbox:focus-within{border-color:rgba(196,144,46,.4);box-shadow:0 0 0 3px rgba(196,144,46,.08),var(--sh-md)}
.in-top{display:flex;align-items:flex-end;gap:var(--sp2);padding:var(--sp4) var(--sp3) var(--sp3) var(--sp4)}
.ta{flex:1;background:transparent;border:none;outline:none;color:var(--tx);font-size:15px;font-family:var(--ff);resize:none;min-height:24px;max-height:140px;line-height:1.6;-webkit-appearance:none;font-weight:400}
.ta::placeholder{color:var(--tx3);font-weight:400}

/* Bottom row of composer */
.in-bot{display:flex;align-items:center;padding:var(--sp1) var(--sp3) var(--sp3);gap:var(--sp1);overflow:hidden}
.in-left{display:flex;align-items:center;gap:3px;flex:1;overflow:hidden}
.in-right{display:flex;align-items:center;gap:var(--sp2);flex-shrink:0;margin-left:auto}

.tb-btn{width:30px;height:30px;border:none;background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);transition:all var(--ease);flex-shrink:0}
.tb-btn:hover{background:var(--sf2);color:var(--tx2)}
.tb-sep{width:1px;height:16px;background:var(--br);flex-shrink:0;margin:0 var(--sp1)}

/* Mode button — the core mode selector */
.mode-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border:1px solid var(--br);border-radius:20px;font-size:11.5px;font-weight:600;font-family:var(--ff);color:var(--tx2);background:transparent;cursor:pointer;transition:all var(--ease);white-space:nowrap;flex-shrink:0;letter-spacing:.2px}
.mode-btn:hover{background:var(--sf2);border-color:var(--br2)}
/* Mode-specific color */
.mode-btn.ask{border-color:var(--br);color:var(--tx2)}
.mode-btn.think{border-color:rgba(196,144,46,.3);color:var(--gd);background:var(--gd-l)}
.mode-btn.research{border-color:rgba(88,152,204,.28);color:var(--bl);background:rgba(88,152,204,.07)}
.mode-btn.build{border-color:rgba(58,184,152,.28);color:var(--teal);background:rgba(58,184,152,.07)}
.mode-btn.act{border-color:rgba(196,76,60,.28);color:var(--coral);background:rgba(196,76,60,.07)}

.q-chip{display:inline-flex;align-items:center;padding:3px 10px;border:1px solid var(--br);border-radius:20px;font-size:11.5px;font-family:var(--ff);color:var(--tx2);background:transparent;cursor:pointer;transition:all var(--ease);white-space:nowrap;flex-shrink:0}
.q-chip:hover{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}

/* Send button — premium square-rounded shape */
.sbtn{width:34px;height:34px;flex-shrink:0;background:var(--tx);border:none;border-radius:var(--r3);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.sbtn:hover{opacity:.86;transform:scale(1.02)}
.sbtn:active{transform:scale(.95)}
.sbtn svg,.stopbtn svg{width:12px;height:12px}
.stopbtn{width:34px;height:34px;flex-shrink:0;background:var(--tx);border:none;border-radius:var(--r3);color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.stopbtn:active{opacity:.75}

/* Power indicator */
.pwr-tag{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--tx3);white-space:nowrap;letter-spacing:.2px}
.pwr-dot{width:5px;height:5px;border-radius:50%;background:var(--gn);flex-shrink:0;animation:pls 2.8s ease-in-out infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.25}}

/* ══════════════════════════════════════
   CHAT HEADER — Phase 1
   ══════════════════════════════════════ */
.chat-hdr{padding:var(--sp2) var(--sp3);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:var(--sp2);background:var(--sf);flex-shrink:0;min-height:54px}
.hdr-home{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;text-decoration:none;padding:var(--sp1) var(--sp2);border-radius:var(--r2);transition:background var(--ease)}
.hdr-home:hover{background:var(--sf2)}
.hdr-logo-nm{font-size:11px;font-weight:700;letter-spacing:4.5px;text-transform:uppercase;color:var(--tx)}
.hdr-sep{width:1px;height:18px;background:var(--br);flex-shrink:0}

/* Specialist picker in header */
.hdr-spec-btn{display:flex;align-items:center;gap:var(--sp2);flex:1;min-width:0;padding:var(--sp1) var(--sp2);border:1px solid transparent;border-radius:var(--r3);cursor:pointer;background:transparent;font-family:var(--ff);transition:all var(--ease)}
.hdr-spec-btn:hover{background:var(--sf2);border-color:var(--br)}
.hdr-spec-av{width:28px;height:28px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--br)}
.hdr-spec-info{min-width:0;flex:1;text-align:left}
.hdr-spec-nm{font-size:13px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx)}
.hdr-spec-role{font-size:10.5px;color:var(--tx3);line-height:1;margin-top:1px;letter-spacing:.2px}
.hdr-spec-chev{color:var(--tx3);flex-shrink:0}

/* Mode badge */
.hdr-badge{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;cursor:pointer;border:1px solid var(--br);color:var(--tx2);background:transparent;font-family:var(--ff);transition:all var(--ease);white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
.hdr-badge:hover{background:var(--sf2)}
.hdr-badge[data-m="think"]{border-color:rgba(196,144,46,.3);color:var(--gd);background:var(--gd-l)}
.hdr-badge[data-m="research"]{border-color:rgba(88,152,204,.28);color:var(--bl);background:rgba(88,152,204,.07)}
.hdr-badge[data-m="build"]{border-color:rgba(58,184,152,.28);color:var(--teal);background:rgba(58,184,152,.07)}
.hdr-badge[data-m="act"]{border-color:rgba(196,76,60,.28);color:var(--coral);background:rgba(196,76,60,.07)}

.hdr-btn{width:30px;height:30px;border:1px solid var(--br);border-radius:var(--r2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--ease);flex-shrink:0}
.hdr-btn:hover{background:var(--sf2);border-color:var(--br2)}
.hdr-btn.act{background:var(--gd-l);color:var(--gd);border-color:var(--gd-b)}

/* ══════════════════════════════════════
   MESSAGES — Phase 1
   ══════════════════════════════════════ */
.msgs-outer{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overflow-x:hidden;position:relative}
.msgs-outer::-webkit-scrollbar{width:3px}
.msgs-outer::-webkit-scrollbar-thumb{background:var(--br2);border-radius:2px}
.msgs-inner{padding:var(--sp6) var(--sp5) var(--sp3);display:flex;flex-direction:column;gap:var(--sp5);max-width:880px;margin:0 auto;width:100%}

/* Scroll to bottom */
.scroll-dn{position:absolute;bottom:var(--sp3);left:50%;transform:translateX(-50%);width:32px;height:32px;background:var(--sf);border:1px solid var(--br);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--sh-md);color:var(--tx2);opacity:0;pointer-events:none;transition:opacity var(--ease)}
.scroll-dn.show{opacity:1;pointer-events:all}

/* Thinking indicator */
.thinking-bar{display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp4);background:var(--sf);border-radius:20px;border:1px solid var(--br);font-size:12.5px;color:var(--tx2);width:fit-content;box-shadow:var(--sh)}
.spin{width:12px;height:12px;border:1.5px solid var(--br2);border-top-color:var(--gd);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Message layout */
.msg{display:flex;gap:var(--sp2);max-width:88%}
.msg.u{flex-direction:row-reverse;align-self:flex-end;max-width:74%}
.msg.a{align-self:flex-start;max-width:88%}

/* Avatar */
.m-av{width:28px;height:28px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:3px;border:1px solid var(--br)}

/* Message body */
.m-body{display:flex;flex-direction:column;gap:var(--sp1);min-width:0}

/* Bubbles */
.m-bbl{padding:var(--sp3) var(--sp4);border-radius:var(--r5);font-size:14.5px;line-height:1.78;word-break:break-word;-webkit-user-select:text;user-select:text}
.msg.u .m-bbl{background:var(--user-bg);color:var(--user-tx);border-bottom-right-radius:var(--r1);backdrop-filter:blur(2px)}
.msg.a .m-bbl{background:var(--ai-bg);color:var(--tx);border-bottom-left-radius:var(--r1);border:1px solid var(--ai-bd)}

/* Timestamp — quieter */
.m-time{font-size:8.5px;color:var(--tx3);padding:0 var(--sp1);font-family:var(--fm);letter-spacing:.3px;opacity:.7}
.msg.u .m-time{text-align:right}

/* Source badge */
.src-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border:1px solid var(--br);border-radius:20px;font-size:11.5px;color:var(--tx3);cursor:pointer;background:transparent;transition:all var(--ease);font-family:var(--ff);margin-top:3px;letter-spacing:.1px}
.src-badge:hover{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}
.src-dot{width:4px;height:4px;border-radius:50%;background:var(--gn);display:inline-block}

/* Follow-ups — horizontal scroll row, not vertical stack */
.followups{margin-top:var(--sp2);display:flex;gap:var(--sp2);overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.followups::-webkit-scrollbar{height:0}
.fup{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--br);border-radius:20px;font-size:12.5px;color:var(--tx2);cursor:pointer;background:var(--sf);transition:all var(--ease);text-align:left;font-family:var(--ff);white-space:nowrap;flex-shrink:0;min-height:32px}
.fup:hover{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}

/* Message actions */
.m-actions{display:flex;gap:2px;opacity:0;transition:opacity var(--ease)}
.msg:hover .m-actions{opacity:1}
.mac{width:26px;height:26px;border:none;background:transparent;color:var(--tx3);cursor:pointer;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;transition:all var(--ease)}
.mac:hover{background:var(--sf2);color:var(--tx2)}
.mac.ok{color:var(--gn)}

/* Lynk button */
.lynk-btn{display:inline-flex;align-items:center;gap:6px;padding:var(--sp2) var(--sp4);margin-top:var(--sp2);background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:var(--r3);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff);letter-spacing:.2px}
.lynk-btn:active{transform:scale(.97)}

/* ══════════════════════════════════════
   THINK / REASONING BLOCK — Phase 1
   More editorial, less dev-utility
   ══════════════════════════════════════ */
.think-block{margin-bottom:var(--sp2);border:1px solid rgba(196,144,46,.18);border-radius:var(--r4);background:rgba(196,144,46,.04);overflow:hidden}
.think-hdr{display:flex;align-items:center;gap:6px;padding:var(--sp2) var(--sp3);cursor:pointer;font-size:11.5px;color:var(--gd);font-weight:600;user-select:none;letter-spacing:.3px;text-transform:uppercase}
.think-hdr .chev{transition:transform .22s;flex-shrink:0;opacity:.6}
.think-hdr.open .chev{transform:rotate(90deg)}
.think-body{padding:0 var(--sp3) var(--sp3);font-size:12px;color:var(--tx3);line-height:1.72;max-height:220px;overflow-y:auto;display:none;border-top:1px solid rgba(196,144,46,.12);padding-top:var(--sp2)}
.think-body.show{display:block}
.think-body::-webkit-scrollbar{width:2px}
.think-body::-webkit-scrollbar-thumb{background:var(--gd-b)}

/* ══════════════════════════════════════
   TOOL STRIP — Phase 1
   ══════════════════════════════════════ */
.tool-strip{display:flex;gap:5px;overflow-x:auto;max-width:740px;width:100%;padding:6px 0 4px;scrollbar-width:none}
.tool-strip::-webkit-scrollbar{height:0}
.tool-btn{display:inline-flex;align-items:center;gap:4px;white-space:nowrap;padding:4px 10px;border:1px solid var(--br);border-radius:20px;font-size:11.5px;color:var(--tx2);cursor:pointer;background:transparent;transition:all var(--ease);font-family:var(--ff);flex-shrink:0;min-height:26px;letter-spacing:.1px}
.tool-btn:hover{border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}
.tool-btn.widget{border-style:dashed;color:var(--tx3)}
.tool-btn.widget:hover{border-style:solid;border-color:var(--gd-b);color:var(--gd);background:var(--gd-l)}

/* ══════════════════════════════════════
   DOCK — Phase 1
   ══════════════════════════════════════ */
.dock{padding:var(--sp2) var(--sp4);padding-bottom:calc(var(--sp2) + var(--sab));border-top:1px solid var(--br);background:var(--sf);flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.dock .inbox{max-width:740px}

/* ══════════════════════════════════════
   MODE MENU — Phase 1
   ══════════════════════════════════════ */
.mode-menu{position:fixed;background:var(--sf);border:1px solid var(--br);border-radius:var(--r6);box-shadow:var(--sh-pop);min-width:240px;z-index:220;overflow:hidden;display:none}
.mm-head{padding:var(--sp3) var(--sp4) var(--sp2);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);border-bottom:1px solid var(--br)}
.mm-opt{display:flex;align-items:center;gap:var(--sp3);padding:var(--sp2) var(--sp4);cursor:pointer;transition:background var(--ease);min-height:46px}
.mm-opt:hover{background:var(--sf2)}
.mm-ic{width:30px;height:30px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;background:var(--sf2);border:1px solid var(--br);flex-shrink:0;font-size:14px}
.mm-txt{flex:1}
.mm-nm{font-size:13px;font-weight:600;color:var(--tx);line-height:1.25}
.mm-dc{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4}
.mm-ck{color:var(--gd);flex-shrink:0;opacity:0}
.mm-ck.vis{opacity:1}

/* ══════════════════════════════════════
   CONTEXT PANEL — Phase 1
   ══════════════════════════════════════ */
.ctx-panel{position:fixed;top:0;right:0;bottom:0;width:min(var(--ctx-w),90vw);background:var(--sf);border-left:1px solid var(--br);box-shadow:var(--sh-xl);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform var(--panel-dur) cubic-bezier(.4,0,.2,1)}
.ctx-panel.open{transform:translateX(0)}
.cp-head{padding:var(--sp4);padding-top:calc(var(--sp4) + var(--sat));border-bottom:1px solid var(--br);display:flex;align-items:center;gap:var(--sp2);flex-shrink:0}
.cp-title{font-size:13.5px;font-weight:700;flex:1;letter-spacing:.2px}
.cp-type-badge{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 8px;border-radius:var(--r1);background:var(--sf2);color:var(--tx3);border:1px solid var(--br)}
.cp-body{flex:1;overflow-y:auto;padding:var(--sp3);display:flex;flex-direction:column;gap:var(--sp2)}
.cp-body::-webkit-scrollbar{width:2px}
.cp-body::-webkit-scrollbar-thumb{background:var(--br2)}

/* Source items */
.sp-item{padding:var(--sp3);border:1px solid var(--br);border-radius:var(--r3);background:var(--sf2);cursor:pointer;transition:all var(--ease)}
.sp-item:hover{border-color:var(--gd-b);background:var(--gd-l)}
.sp-src{font-size:10px;color:var(--gn);font-weight:700;margin-bottom:var(--sp1);display:flex;align-items:center;gap:4px;letter-spacing:.4px;text-transform:uppercase}
.sp-dot{width:5px;height:5px;border-radius:50%;background:var(--gn);flex-shrink:0}
.sp-t{font-size:12.5px;font-weight:500;color:var(--tx);margin-bottom:2px;line-height:1.4}
.sp-r{font-size:10.5px;color:var(--tx3)}
.sp-note{font-size:9.5px;color:var(--tx3);line-height:1.6;padding:var(--sp2) var(--sp3);border:1px dashed var(--br);border-radius:var(--r2);margin-top:var(--sp1)}

/* Empty state */
.cp-empty{font-size:13px;color:var(--tx3);text-align:center;margin-top:var(--sp10);line-height:2;padding:0 var(--sp4)}
.cp-empty strong{color:var(--tx2);font-weight:500}

/* ══════════════════════════════════════
   SPECIALIST LIBRARY — Phase 1
   ══════════════════════════════════════ */
.lib-overlay{position:fixed;inset:0;background:var(--lib-bg);z-index:180;display:none;align-items:flex-end;justify-content:center;padding-bottom:0;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.lib-overlay.show{display:flex}
.lib-drawer{width:100%;max-width:700px;max-height:88vh;background:var(--sf);border-radius:var(--r7) var(--r7) 0 0;box-shadow:var(--sh-xl);display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform var(--panel-dur) cubic-bezier(.4,0,.2,1)}
.lib-overlay.show .lib-drawer{transform:translateY(0)}
.lib-hdr{padding:var(--sp4) var(--sp5) var(--sp3);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:var(--sp3);flex-shrink:0}
/* Drag handle */
.lib-hdr::before{content:'';position:absolute;left:50%;top:8px;transform:translateX(-50%);width:32px;height:3px;background:var(--br2);border-radius:2px}
.lib-hdr{position:relative}
.lib-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.1px}
.lib-search{flex:1;max-width:200px;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r3);padding:7px var(--sp3);font-size:13px;color:var(--tx);font-family:var(--ff);outline:none;transition:border-color var(--ease)}
.lib-search:focus{border-color:var(--gd);background:var(--sf)}
.lib-search::placeholder{color:var(--tx3)}
.lib-body{flex:1;overflow-y:auto;padding:var(--sp4) var(--sp5) var(--sp8);-webkit-overflow-scrolling:touch}
.lib-body::-webkit-scrollbar{width:3px}
.lib-body::-webkit-scrollbar-thumb{background:var(--br2)}
.lib-folder-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--tx3);margin-bottom:var(--sp2);margin-top:var(--sp5);padding-top:var(--sp4);border-top:1px solid var(--br)}
.lib-folder-lbl:first-child{margin-top:0;padding-top:0;border-top:none}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--sp2);margin-bottom:var(--sp1)}
.lib-card{display:flex;align-items:flex-start;gap:var(--sp3);padding:var(--sp3) var(--sp4);border:1px solid var(--br);border-radius:var(--r4);cursor:pointer;background:var(--sf2);transition:all var(--ease)}
.lib-card:hover{border-color:var(--gd-b);background:var(--gd-l);transform:translateY(-1px);box-shadow:var(--sh)}
.lib-card.act{border-color:var(--gd-b);background:var(--gd-l)}
.lib-card-av{width:34px;height:34px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--br)}
.lib-card-txt{min-width:0}
.lib-card-role{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);line-height:1;margin-bottom:3px}
.lib-card-nm{font-size:13px;font-weight:600;color:var(--tx);line-height:1.3}
.lib-card-desc{font-size:11.5px;color:var(--tx3);line-height:1.4;margin-top:2px}
.lib-card.act .lib-card-role{color:var(--gd)}
.lib-card.act .lib-card-nm{color:var(--gd)}

/* ══════════════════════════════════════
   SPECIALIST PICKER DROPDOWN
   ══════════════════════════════════════ */
.spec-picker{position:fixed;background:var(--sf);border:1px solid var(--br);border-radius:var(--r6);box-shadow:var(--sh-pop);min-width:260px;max-width:300px;z-index:220;overflow:hidden;display:none;max-height:400px;overflow-y:auto}
.spec-picker::-webkit-scrollbar{width:3px}
.spec-picker::-webkit-scrollbar-thumb{background:var(--br2)}
.spec-picker-head{padding:var(--sp3) var(--sp4) var(--sp2);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);position:sticky;top:0;background:var(--sf);border-bottom:1px solid var(--br)}
.spec-pick-opt{display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp4);cursor:pointer;transition:background var(--ease);min-height:46px}
.spec-pick-opt:hover{background:var(--sf2)}
.spec-pick-opt.act{background:var(--gd-l)}
.spec-pick-av{width:28px;height:28px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--br)}
.spec-pick-txt{flex:1;min-width:0}
.spec-pick-nm{font-size:13px;font-weight:500;color:var(--tx);line-height:1.25}
.spec-pick-role{font-size:10.5px;color:var(--tx3);margin-top:1px}
.spec-pick-ck{color:var(--gd);flex-shrink:0;opacity:0}
.spec-pick-opt.act .spec-pick-ck{opacity:1}
.spec-pick-divider{height:1px;background:var(--br);margin:3px 0}
.spec-pick-browse{display:flex;align-items:center;gap:var(--sp2);padding:var(--sp2) var(--sp4);cursor:pointer;font-size:13px;color:var(--gd);font-weight:500;transition:background var(--ease)}
.spec-pick-browse:hover{background:var(--sf2)}

/* ══════════════════════════════════════
   CARD SYSTEM — Phase 1
   ══════════════════════════════════════ */
.card-host{margin-top:var(--sp2);display:flex;flex-direction:column;gap:var(--sp3)}
.card{border:1px solid var(--br);border-radius:var(--r5);overflow:hidden;background:var(--card-bg);box-shadow:var(--sh)}
.card-hdr{padding:var(--sp3) var(--sp4);background:var(--card-hdr);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:var(--sp3)}
.card-badge{padding:2px 8px;border-radius:var(--r1);font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.card-badge.trip{background:rgba(88,152,204,.12);color:var(--bl)}
.card-badge.civic{background:var(--gd-l);color:var(--gd)}
.card-badge.crop{background:rgba(58,184,152,.1);color:var(--teal)}
.card-badge.quiz{background:rgba(168,112,204,.1);color:#a870cc}
.card-title{font-size:13.5px;font-weight:600;flex:1;line-height:1.3}
.card-body{padding:var(--sp4) var(--sp4)}

/* Trip card */
.trip-meta{display:flex;gap:var(--sp2);flex-wrap:wrap;margin-bottom:var(--sp3)}
.trip-meta-item{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--tx2);padding:3px 9px;background:var(--sf2);border:1px solid var(--br);border-radius:20px}
.trip-day{border:1px solid var(--br);border-radius:var(--r3);margin-bottom:var(--sp2);overflow:hidden}
.trip-day-hdr{padding:var(--sp2) var(--sp4);display:flex;align-items:center;gap:var(--sp2);cursor:pointer;background:var(--sf2);font-size:13px;font-weight:500;user-select:none}
.trip-day-hdr:hover{background:var(--sf3)}
.trip-day-num{width:22px;height:22px;border-radius:50%;background:var(--gd-l);border:1px solid var(--gd-b);color:var(--gd);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.trip-day-chev{margin-left:auto;color:var(--tx3);transition:transform .2s}
.trip-day-hdr.open .trip-day-chev{transform:rotate(90deg)}
.trip-day-body{display:none}
.trip-day-body.show{display:block}
.trip-item{display:flex;gap:var(--sp3);padding:var(--sp2) var(--sp4);border-top:1px solid var(--br)}
.trip-time{font-size:10.5px;color:var(--tx3);font-family:var(--fm);min-width:52px;flex-shrink:0;padding-top:2px}
.trip-act{flex:1;font-size:13px;line-height:1.45;color:var(--tx)}
.trip-cost{font-size:11px;color:var(--gn);font-weight:600;white-space:nowrap;padding-top:2px;flex-shrink:0}
.trip-tips{margin-top:var(--sp3);padding:var(--sp3) var(--sp4);background:var(--gd-l);border-left:2px solid var(--gd);border-radius:0 var(--r2) var(--r2) 0;font-size:12px;color:var(--tx2);line-height:1.6}

/* Civic card */
.civic-section{margin-bottom:var(--sp4)}
.civic-section-lbl{font-size:9.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--tx3);margin-bottom:var(--sp2)}
.civic-doc-row{display:flex;align-items:flex-start;gap:var(--sp2);padding:6px 0;font-size:13px;color:var(--tx);border-bottom:1px solid var(--br);cursor:pointer;transition:color var(--ease)}
.civic-doc-row:last-child{border-bottom:none}
.civic-doc-row:hover{color:var(--gd)}
.civic-check{width:16px;height:16px;border:1.5px solid var(--br2);border-radius:var(--r1);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.civic-check.done{background:var(--gn);border-color:var(--gn);display:flex;align-items:center;justify-content:center}
.civic-step-row{display:flex;gap:var(--sp3);padding:7px 0;border-bottom:1px solid var(--br);font-size:13px;color:var(--tx)}
.civic-step-row:last-child{border-bottom:none}
.civic-step-num{width:22px;height:22px;border-radius:50%;background:var(--gd-l);border:1px solid var(--gd-b);color:var(--gd);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.fee-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--br);font-size:13px}
.fee-row:last-child{border-bottom:none}
.fee-amount{font-weight:600;color:var(--gd)}
.contact-row{display:flex;align-items:center;gap:var(--sp2);padding:6px 0;font-size:13px}
.contact-lbl{color:var(--tx2);min-width:80px;font-size:12px}
.contact-val{color:var(--tx);font-weight:500}

/* Crop card */
.severity-wrap{margin-bottom:var(--sp3)}
.severity-label{display:flex;justify-content:space-between;align-items:center;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.sev-low{color:var(--gn)}.sev-medium{color:var(--am)}.sev-high{color:var(--rd)}
.severity-bar{height:3px;border-radius:2px;background:var(--br2);overflow:hidden}
.severity-fill{height:100%;border-radius:2px}
.sev-fill-low{background:var(--gn);width:33%}
.sev-fill-medium{background:var(--am);width:66%}
.sev-fill-high{background:var(--rd);width:100%}
.crop-section{margin-bottom:var(--sp3)}
.crop-lbl{font-size:9.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--tx3);margin-bottom:var(--sp2)}
.crop-item-row{display:flex;gap:var(--sp2);padding:4px 0;font-size:13px;color:var(--tx)}
.crop-dot{width:5px;height:5px;border-radius:50%;background:var(--gd);flex-shrink:0;margin-top:6px}
.crop-action-row{display:flex;gap:var(--sp3);padding:6px 0;border-bottom:1px solid var(--br);font-size:13px;color:var(--tx)}
.crop-action-row:last-child{border-bottom:none}
.crop-action-num{width:20px;height:20px;border-radius:50%;background:var(--gd-l);border:1px solid var(--gd-b);color:var(--gd);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.rada-box{margin-top:var(--sp3);padding:var(--sp2) var(--sp3);background:var(--sf2);border:1px solid var(--br);border-radius:var(--r3);font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:var(--sp2)}

/* Quiz card */
.quiz-progress{display:flex;gap:4px;margin-bottom:var(--sp4)}
.quiz-pip{height:3px;flex:1;border-radius:2px;background:var(--br2)}
.quiz-pip.done{background:var(--gd)}
.quiz-pip.current{background:var(--gd);opacity:.4}
.quiz-prompt{font-size:13.5px;font-weight:500;line-height:1.6;margin-bottom:var(--sp3);color:var(--tx)}
.quiz-opts{display:flex;flex-direction:column;gap:var(--sp2)}

.quiz-opt:hover:not(.disabled){border-color:var(--gd-b);background:var(--gd-l)}
.quiz-opt.correct{border-color:var(--gn)!important;background:rgba(34,197,94,.09)!important;color:#166534}
.quiz-opt.wrong{border-color:var(--rd)!important;background:rgba(224,82,82,.07)!important;color:#991b1b}
.quiz-opt.disabled{cursor:default;pointer-events:none}
.quiz-opt-key{width:20px;height:20px;border-radius:4px;border:1px solid var(--br2);background:var(--sf);font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.quiz-explanation{padding:var(--sp2) var(--sp3);background:var(--gd-l);border-left:2px solid var(--gd);border-radius:0 var(--r2) var(--r2) 0;font-size:12px;margin-top:var(--sp2);color:var(--tx2);line-height:1.6}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;margin-top:var(--sp3)}
.quiz-score{font-size:11.5px;color:var(--tx3)}
.quiz-next-btn{padding:6px var(--sp4);background:var(--tx);border:none;border-radius:var(--r2);color:var(--bg);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--ff)}
.quiz-next-btn:hover{opacity:.85}
.quiz-done-box{text-align:center;padding:var(--sp5) 0 var(--sp2)}
.quiz-done-score{font-size:38px;font-weight:700;color:var(--gd);line-height:1}
.quiz-done-sub{font-size:14px;color:var(--tx2);margin-top:var(--sp2)}
.quiz-retry-btn{margin-top:var(--sp4);padding:var(--sp2) var(--sp5);border:1px solid var(--br);border-radius:var(--r2);font-size:13px;font-weight:500;cursor:pointer;background:transparent;font-family:var(--ff);color:var(--tx2);transition:all var(--ease)}
.quiz-retry-btn:hover{background:var(--sf2);color:var(--tx)}

   WIDGET CARDS
   ══════════════════════════════════════ */

.w-body{padding:var(--sp4)}
.w-row{display:flex;gap:var(--sp3);margin-bottom:var(--sp3);flex-wrap:wrap}
.w-field{display:flex;flex-direction:column;gap:var(--sp1);flex:1;min-width:120px}
.w-lbl{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--tx3)}
.w-inp{padding:var(--sp2) var(--sp3);border:1px solid var(--br);border-radius:var(--r2);font-size:13px;font-family:var(--ff);color:var(--tx);background:var(--inp-bg);outline:none;transition:border-color var(--ease);width:100%}
.w-inp:focus{border-color:var(--gd)}
.w-sel{padding:var(--sp2) var(--sp3);border:1px solid var(--br);border-radius:var(--r2);font-size:13px;font-family:var(--ff);color:var(--tx);background:var(--inp-bg);outline:none;width:100%;cursor:pointer}
.w-btn{padding:var(--sp2) var(--sp5);background:var(--tx);border:none;border-radius:var(--r2);color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:opacity var(--ease)}
.w-btn:hover{opacity:.85}
.w-result{background:var(--sf2);border:1px solid var(--br);border-radius:var(--r3);padding:var(--sp3) var(--sp4);margin-top:var(--sp3);display:none}

.inv-items td:last-child{text-align:right}

.civic-mistake-row{font-size:12.5px;color:var(--tx2);padding:5px 0;border-bottom:1px solid var(--br);line-height:1.5}
.civic-mistake-row:last-child{border-bottom:none}

/* ══════════════════════════════════════
   ANIMATIONS — Phase 1
   ══════════════════════════════════════ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.fu{animation:fadeUp .3s var(--ease-out) forwards}

@keyframes fi{from{opacity:0}to{opacity:1}}
.fi{animation:fi .2s ease forwards}

/* Staggered message entry */
.msg{animation:msgIn .22s var(--ease-out) both}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.cursor{display:inline-block;width:2px;height:1em;background:var(--gd);margin-left:2px;animation:blink .9s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Accessibility: respect reduced motion */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}

/* ══════════════════════════════════════
   RESPONSIVE — Phase 1
   ══════════════════════════════════════ */
@media(max-width:700px){
  .sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);padding-left:var(--sal)}

  .sb-overlay{display:block}
  .sb-close{display:flex}
  .top-bar{display:flex}
  .hdr-home,.hdr-sep{display:none}

  .followups{gap:var(--sp2)}
  .lib-drawer{border-radius:var(--r7) var(--r7) 0 0;max-height:92vh}

  .dock{padding:var(--sp1) var(--sp3);padding-bottom:calc(var(--sp1) + var(--sab))}
}
@media(min-width:701px){

  .hdr-home{display:flex}.hdr-sep{display:block}
  .hdr-badge{display:flex}
  .msg{max-width:82%}.msg.u{max-width:70%}
  .lib-overlay{align-items:center;padding-bottom:0}
  .lib-drawer{border-radius:var(--r7);max-height:82vh;margin:0 auto}
}

    strong:/\b(create|make|generate|build|write).{0,20}\b(invoice|bill|receipt|payment request)\b/i,
    weak:/\b(invoice|bill).{0,15}\b(client|customer|for|jm\$|usd|\d)\b/i
  }

function intentRouter(text, currentMode){
  const t=text.toLowerCase();
  const isBuild=currentMode==='build';

  // Check each workflow — strong signal always wins; weak signal auto-upgrades to build
  for(const[type, rules] of Object.entries(INTENT_RULES)){
    if(rules.strong.test(t))return{type, needsCards:true, autoUpgrade:!isBuild};
    if(isBuild&&rules.weak.test(t))return{type, needsCards:true};
    if(!isBuild&&rules.weak.test(t))return{type, needsCards:true, autoUpgrade:true};
  }
  if(isBuild)return{type:'general',needsCards:false};
  return{type:'general',needsCards:false};
}

function contextAssembler(modeKey,agent,intent){
  let sys=BASE_SYSTEM+'\n\n'+MODES[modeKey].prefix+'\n\n'+agent.sys;
  if(intent.needsCards&&CARD_SCHEMAS[intent.type])sys+=CARD_SCHEMAS[intent.type];
  return sys;
}

// ── CARD PARSER ──
function parseCardResponse(text){
  let t=text.trim().replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
  const s=t.indexOf('{'),e=t.lastIndexOf('}');
  if(s===-1||e===-1)return null;
  try{const p=JSON.parse(t.slice(s,e+1));return(p.cards&&p.cards.length)?p:null;}catch{return null;}
}

function copyInvoiceText(cardId){
  const card=cardRegistry[cardId];if(!card)return;
  const d=card.data||{};
  const items=(d.items||[]).map(it=>`  ${it.description}: ${it.amount||it.unitPrice||0}`).join('\n');
  const sub=parseFloat(d.subtotal)||0;const gct=parseFloat(d.gct)||0;const total=parseFloat(d.total)||0;
  const text=`INVOICE ${d.invoiceNum||'INV-001'}\nFrom: ${d.from||''}\nTo: ${d.to||''}\nDate: ${d.issueDate||''}  Due: ${d.dueDate||''}\n\nItems:\n${items}\n\nSubtotal: JM$${sub}\nGCT 15%: JM$${gct}\nTotal: JM$${total}\n\n${d.paymentNote||''}`;
  navigator.clipboard?.writeText(text).catch(()=>{});alert('Invoice copied to clipboard!');
}

function launchTool(agId, toolId){

    setMode(tool.m);

function calcPayroll(id){
  const gross=parseFloat(document.getElementById(id+'-gross')?.value)||0;
  const nisRate=parseFloat(document.getElementById(id+'-nis')?.value)||0.03;
  const nis=gross*nisRate;
  const taxable=Math.max(0,gross-nis-125000/12); // ~JM$1.5M annual threshold
  const tax=taxable*0.25;
  const net=gross-nis-tax;
  const fmt=n=>'JM$'+Math.round(n).toLocaleString();
  document.getElementById(id+'-g').textContent=fmt(gross);
  document.getElementById(id+'-nis-amt').textContent=fmt(nis);
  document.getElementById(id+'-tax').textContent=fmt(tax);
  document.getElementById(id+'-net').textContent=fmt(net);
  document.getElementById(id+'-res').classList.add('show');
}

  const d=data[crop]||{yield:5000,price:200,cost:100000};
  const yld=d.yield*acres;const rev=yld*d.price;const cost=d.cost*acres;const profit=rev-cost;

  document.getElementById(id+'-yld').textContent=fmtW(yld);

function calcTripBudget(id){
  const nights=parseInt(document.getElementById(id+'-nights')?.value)||3;

  const lvl=document.getElementById(id+'-lvl')?.value||'mid';

  }return null;
}

// ── ORCHESTRATOR ──
async function doSend(){
  const ta=document.getElementById('cta');const txt=ta?.value.trim();if(!txt||busy)return;
  ta.value='';ta.style.height='auto';
  busy=true;setSendState(true);
  msgs.push({role:'user',content:txt});addUserBubble(txt);
  // Auto-trigger widget if query strongly matches a widget pattern
  const widgetMatch=checkWidgetTrigger(txt);
  if(widgetMatch){openWidget(widgetMatch);busy=false;abortCtrl=null;setSendState(false);if(window.innerWidth>700)document.getElementById('cta')?.focus();return;}
  const tid=showThinking();
  const src=curAg.rag.slice().sort(()=>Math.random()-.5).slice(0,2+Math.floor(Math.random()*2));
  lastSources=src;
  const intent=intentRouter(txt,mode);
  _lastIntentType=intent.type;
  const systemPrompt=contextAssembler(mode,curAg,intent);
  const m=MODES[mode];
  const useCards=intent.needsCards&&m.model!=='deepseek-reasoner';
  const shouldStream=useCards?false:m.stream;
  const bodyObj={model:m.model,messages:[{role:'system',content:systemPrompt},...msgs.slice(-14)],max_tokens:useCards?Math.max(m.tokens,1400):m.tokens,stream:shouldStream};
  if(m.temp!==null&&!useCards)bodyObj.temperature=m.temp;
  if(useCards)bodyObj.response_format={type:'json_object'};
  try{
    abortCtrl=new AbortController();
  const url='https://api.deepseek.com/v1/chat/completions';
  const res=await fetch(url,{method:'POST',mode:'cors',credentials:'omit',headers:{'Content-Type':'application/json','Authorization':'Bearer '+KEY},body:JSON.stringify(bodyObj),signal:abortCtrl.signal});
    removeThinking(tid);
    if(!res.ok){const e=await res.json().catch(()=>({}));const code=res.status;const msg=e.error?.message||(code===401?'Invalid API key — check your DeepSeek key.':code===429?'Rate limited — wait a moment and try again.':code===402?'Insufficient balance — top up your DeepSeek account at platform.deepseek.com.':code>=500?'DeepSeek upstream error — try again shortly.':`Error ${code}`);addErrBubble(msg);}
    else if(shouldStream)await streamResp(res,src);
    else await jsonResp(res,src,intent);
  }catch(e){
    removeThinking(tid);
    if(e.name!=='AbortError'){addErrBubble('Connection error: '+(e.message||'please try again. Check your internet connection.'));}
  }
  busy=false;abortCtrl=null;setSendState(false);
  if(window.innerWidth>700)document.getElementById('cta')?.focus();
}

async function jsonResp(res,sources,intent){
  const data=await res.json();const raw=data.choices?.[0]?.message?.content||'';
  msgs.push({role:'assistant',content:raw});
  const parsed=parseCardResponse(raw);
  if(parsed){
    if(parsed.cards)lastCards.push(...parsed.cards);
    const intro=parsed.answer_markdown?fmt(parsed.answer_markdown):'';
    addFinalBubble(intro+renderCards(parsed.cards),sources,parsed.followups||[],'card');
    if(parsed.sources?.length)lastSources=[...lastSources,...parsed.sources.map(s=>s.title+' – '+(s.url||'External'))].slice(0,4);
  }else{addFinalBubble(fmt(raw),sources,[],'');}
  scrollBot();if(ctxOpen)updateCtxContent();
}
async function streamResp(res,sources){
  const reader=res.body.getReader(),dec=new TextDecoder();
  let full='',reasoning='';const id='b'+Date.now();const isThink=mode==='think';
  addStreamBubble(id);
  try{while(true){const{done,value}=await reader.read();if(done)break;const lines=dec.decode(value,{stream:true}).split('\n');for(const ln of lines){if(ln.startsWith('data: ')&&ln!=='data: [DONE]'){try{const d=JSON.parse(ln.slice(6));const rc=d.choices?.[0]?.delta?.reasoning_content||'';const c=d.choices?.[0]?.delta?.content||'';if(rc)reasoning+=rc;if(c)full+=c;updStream(id,full,reasoning,isThink);}catch{}}}}}catch{}
  finalStream(id,full,reasoning,sources,isThink);
  msgs.push({role:'assistant',content:full});scrollBot();if(ctxOpen)updateCtxContent();
}
function addUserBubble(txt){const area=document.getElementById('msgs');if(!area)return;const d=document.createElement('div');d.className='msg u fi';d.innerHTML=`<div class="m-body"><div class="m-bbl">${esc(txt)}</div><div class="m-time">${now()}</div></div>`;area.appendChild(d);scrollBot();}
function addStreamBubble(id){const area=document.getElementById('msgs');if(!area)return;const a=curAg;const d=document.createElement('div');d.className='msg a fi';d.id=id;d.innerHTML=`<div class="m-av" style="background:${a.c}12;border-color:${a.c}25;color:${a.c}">${AIC[a.id]}</div><div class="m-body"><div class="m-bbl" id="${id}-bbl"><span class="cursor"></span></div></div>`;area.appendChild(d);scrollBot();}
function updStream(id,text,reasoning,isThink){const bbl=document.getElementById(id+'-bbl');if(!bbl)return;let h='';if(isThink&&reasoning)h+=`<div class="think-block"><div class="think-hdr open" onclick="toggleThink(this)">${SVG.brain} Thinking… <svg class="chev" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg></div><div class="think-body show">${esc(reasoning).replace(/\n/g,'<br/>')}</div></div>`;h+=text?fmt(text)+'<span class="cursor"></span>':'<span class="cursor"></span>';bbl.innerHTML=h;scrollBot();}
function finalStream(id,text,reasoning,sources,isThink){const bbl=document.getElementById(id+'-bbl');if(!bbl)return;let h='';if(isThink&&reasoning)h+=`<div class="think-block"><div class="think-hdr" onclick="toggleThink(this)">${SVG.brain} Thought through this <svg class="chev" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg></div><div class="think-body">${esc(reasoning).replace(/\n/g,'<br/>')}</div></div>`;h+=fmt(text);if(/pay|invoice|lynk|payment/i.test(text))h+=`<br/><button class="lynk-btn" onclick="doLynk()">${SVG.link} Pay via Lynk</button>`;bbl.className='m-bbl';bbl.innerHTML=h;appendMsgFooter(bbl.closest('.m-body'),id,sources,getFups(curAg),'general');}
function addFinalBubble(html,sources,followups,type){const area=document.getElementById('msgs');if(!area)return;const a=curAg;const id='b'+Date.now();const d=document.createElement('div');d.className='msg a fi';d.id=id;d.innerHTML=`<div class="m-av" style="background:${a.c}12;border-color:${a.c}25;color:${a.c}">${AIC[a.id]}</div><div class="m-body"><div class="m-bbl" id="${id}-bbl">${html}</div></div>`;area.appendChild(d);appendMsgFooter(d.querySelector('.m-body'),id,sources,followups,_lastIntentType);scrollBot();}
function appendMsgFooter(mbody,id,sources,followups,intentType){
  if(!mbody)return;mbody.querySelectorAll('.src-badge,.followups,.m-actions,.m-time').forEach(e=>e.remove());
  const t=document.createElement('div');t.style.display='contents';
  const srcH=sources.length?`<button class="src-badge" onclick="openCtxFromSrc(event)">${sources.map(()=>`<span class="src-dot"></span>`).join('')} ${sources.length} source${sources.length>1?'s':''}</button>`:'';
  // Use followups from response, fall back to workflow-specific, then agent default
  const fuList=(followups&&followups.length)?followups:(WORKFLOW_FOLLOWUPS[intentType]||getFups(curAg));
  const fuH=fuList.length?`<div class="followups">${fuList.slice(0,4).map(f=>`<button class="fup" onclick="cfill('${f.replace(/'/g,"&#39;")}')">${SVG.chevR}${esc(f)}</button>`).join('')}</div>`:'';
  const actH=`<div class="m-actions"><button class="mac" id="mac-${id}" onclick="copyMsg('${id}')" aria-label="Copy">${SVG.copy}</button><button class="mac" onclick="fbk(true)" aria-label="Good">${SVG.thumbUp}</button><button class="mac" onclick="fbk(false)" aria-label="Poor">${SVG.thumbDn}</button></div>`;
  t.innerHTML=`<div class="m-time">${now()}</div>`+srcH+fuH+actH;mbody.appendChild(t);
}
// Save the button that triggered the ctx open so we can restore focus on close
function openCtxFromSrc(e){_prevCtxFocus=e?.target;openCtx('sources');}
function toggleThink(hdr){const b=hdr.nextElementSibling;const o=b.classList.toggle('show');hdr.classList.toggle('open',o);}
function addErrBubble(msg){const area=document.getElementById('msgs');if(!area)return;const a=curAg;const d=document.createElement('div');d.className='msg a fi';d.innerHTML=`<div class="m-av" style="background:${a?.c}12;color:${a?.c}">${AIC[a?.id]||''}</div><div class="m-body"><div class="m-bbl" style="color:var(--rd);font-size:13px">${esc(msg)}</div></div>`;area.appendChild(d);scrollBot();}
function showThinking(){const area=document.getElementById('msgs');if(!area)return null;const id='t'+Date.now();const d=document.createElement('div');d.id=id;d.className='fi';const lbl=mode==='think'?'Reasoning with ':mode==='build'?'Building with ':'Processing with ';d.innerHTML=`<div class="thinking-bar"><div class="spin"></div>${lbl}${curAg.n}…</div>`;area.appendChild(d);scrollBot();return id;}
function removeThinking(id){if(id)document.getElementById(id)?.remove();}
function getFups(ag){const m={kayla:['Show me a past paper question','What topics come up most in CXC?'],delroy:['Pests to watch this season?','How to apply for a RADA grant?'],nadine:['What are the visa requirements?','Hotels under US$150/night'],shamar:['How to handle price objections?','Write me a follow-up message'],sashoy:['Write a formal complaint letter','What are my consumer rights?'],bounty:['Make it more dancehall style','Create a social media calendar'],kemar:['How to file quarterly GCT?','Create a payment schedule'],rastajay:['Who is performing at Sumfest 2026?','History of Jamaican dancehall'],oneil:['What documents do I need?','Where is the nearest PICA office?'],biggs:['What licences do I need?','How to open a business bank account?']};return(m[ag.id]||[]).slice(0,2);}
function scrollBot(){const o=document.getElementById('msgs-outer');if(o)o.scrollTop=o.scrollHeight;}
function onScroll(){const o=document.getElementById('msgs-outer'),b=document.getElementById('scroll-btn');if(!o||!b)return;b.classList.toggle('show',o.scrollHeight-o.scrollTop-o.clientHeight>100);}
function setSendState(on){const sb=document.getElementById('csend');if(!sb)return;sb.outerHTML=on?`<button class="stopbtn" id="csend" onclick="stopGen()" aria-label="Stop">${SVG.stop}</button>`:`<button class="sbtn" id="csend" onclick="doSend()" aria-label="Send">${SVG.send}</button>`;}
function stopGen(){if(abortCtrl)abortCtrl.abort();busy=false;setSendState(false);}
function doLynk(){alert(`Lynk Payment Link\nlynk.ly/pay/lignum${Math.floor(Math.random()*9000)+1000}\n\nShare with your customer for instant payment.`);}
function fbk(up){alert(up?'Thanks! Glad that helped.':'Thanks for the feedback.');}
function copyMsg(id){const bbl=document.getElementById(id+'-bbl');if(!bbl)return;navigator.clipboard?.writeText(bbl.innerText).catch(()=>{});const m=document.getElementById('mac-'+id);if(m){m.classList.add('ok');m.innerHTML=SVG.check;setTimeout(()=>{m.classList.remove('ok');m.innerHTML=SVG.copy},1800);}}
function now(){return new Date().toLocaleTimeString('en-JM',{hour:'2-digit',minute:'2-digit'});}
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');}
function fmt(t){if(!t)return'';t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');t=t.replace(/^### (.+)$/gm,'<div style="font-size:13.5px;font-weight:600;margin:11px 0 4px">$1</div>');t=t.replace(/^## (.+)$/gm,'<div style="font-size:15px;font-weight:700;margin:13px 0 5px">$1</div>');t=t.replace(/^\* (.+)$/gm,'<span style="display:block;padding-left:11px;border-left:2px solid var(--gd);margin:4px 0">$1</span>');t=t.replace(/^- (.+)$/gm,'<span style="display:block;padding-left:11px;border-left:2px solid var(--br2);margin:3px 0">$1</span>');t=t.replace(/^\d+\. (.+)$/gm,'<span style="display:block;padding-left:9px;margin:3px 0">• $1</span>');t=t.replace(/(?:^|\n)(?:Tip|Note|Important)[:：] (.+)/g,'\n<div style="display:flex;gap:7px;padding:7px 11px;background:var(--gd-l);border-left:2px solid var(--gd);border-radius:0 6px 6px 0;margin:7px 0;font-size:13px">$1</div>');t=t.replace(/\n/g,'<br/>');return t;}
function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,130)+'px';}
</script>
